<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    content="今、ちょっとしんどいなっていませんか？こころBotは、誰にも言えないことをそのまま話していい場所です。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Meta Pixel Code -->

  <style>
    :root {
      --bg: #f7f5f3;
      --card-bg: #ffffff;
      --text-primary: #2d2d2d;
      --text-secondary: #8f8f8f;
      --text-muted: #b0b0b0;
      --cta-green: #6cc655;
      --cta-green-hover: #5ab847;
      --cta-shadow: rgba(108, 198, 85, 0.28);
      --card-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      --card-radius: 28px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .lp-card {
      width: 100%;
      max-width: 700px;
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      text-align: center;
      padding: 56px 28px 44px;
    }

    .logo-wrap {
      width: 132px;
      height: 132px;
      margin: 0 auto 18px;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
      display: block;
    }

    .brand-name {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
      margin-bottom: 42px;
    }

    .headline {
      font-size: 2.1rem;
      font-weight: 500;
      line-height: 1.55;
      letter-spacing: 0.01em;
      margin-bottom: 26px;
      color: var(--text-primary);
    }

    .sub-copy {
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.9;
      color: var(--text-primary);
      margin-bottom: 42px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 580px;
      min-height: 72px;
      padding: 18px 32px;
      background: var(--cta-green);
      color: #ffffff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 1.15rem;
      font-weight: 700;
      box-shadow: 0 10px 24px var(--cta-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .cta-btn:hover {
      background: var(--cta-green-hover);
      transform: translateY(-2px);
      box-shadow: 0 14px 28px var(--cta-shadow);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    .cta-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text-muted);
    }

    .trust-badges {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #c2c2c2;
      white-space: nowrap;
    }

    .badge-icon {
      width: 18px;
      height: 18px;
      opacity: 0.65;
    }

    @media (max-width: 767px) {
      body {
        padding: 20px 14px;
      }

      .lp-card {
        max-width: 440px;
        padding: 46px 24px 38px;
        border-radius: 24px;
      }

      .logo-wrap {
        width: 118px;
        height: 118px;
        margin-bottom: 16px;
      }

      .logo-img {
        border-radius: 20px;
      }

      .brand-name {
        font-size: 1rem;
        margin-bottom: 34px;
      }

      .headline {
        font-size: 1.35rem;
        line-height: 1.7;
        margin-bottom: 18px;
      }

      .sub-copy {
        font-size: 1rem;
        line-height: 1.8;
        margin-bottom: 34px;
      }

      .cta-btn {
        max-width: 100%;
        min-height: 60px;
        font-size: 1rem;
        padding: 16px 24px;
      }

      .cta-icon {
        width: 22px;
        height: 22px;
      }

      .footer-note {
        font-size: 0.8rem;
        margin-top: 22px;
      }

      .trust-badges {
        margin-top: 28px;
        gap: 18px;
      }

      .badge {
        font-size: 0.78rem;
        gap: 6px;
      }

      .badge-icon {
        width: 16px;
        height: 16px;
      }
    }

    @media (max-width: 374px) {
      .lp-card {
        padding: 38px 18px 32px;
      }

      .headline {
        font-size: 1.18rem;
      }

      .sub-copy {
        font-size: 0.92rem;
      }

      .cta-btn {
        font-size: 0.95rem;
        min-height: 56px;
      }
    }
  </style>
</head>
<body>
  <noscript>
    <img
      height="1"
      width="1"
      style="display:none"
      src="https://www.facebook.com/tr?id=852120511248305&ev=PageView&noscript=1"
      alt=""
    />
  </noscript>

  <main class="lp-card">
    <div class="logo-wrap">
      <img src="logo.png" alt="こころBot" class="logo-img" />
    </div>

    <p class="brand-name">こころBot</p>

    <h1 class="headline">
      今、ちょっとしんどいなって<br />
      思っていませんか？
    </h1>

    <p class="sub-copy">
      ここは、誰にも言えないことを<br />
      そのまま話していい場所です
    </p>

    <a
      href="https://kokoro-bot-mvp2.vercel.app"
      class="cta-btn"
      role="button"
      target="_blank"
      rel="noopener noreferrer"
      onclick="fbq('track', 'Lead');"
    >
      <svg class="cta-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 3C6.477 3 2 6.94 2 11.8c0 2.77 1.49 5.24 3.82 6.86L5 22l3.86-2.12c.99.27 2.04.42 3.14.42 5.523 0 10-3.94 10-8.8S17.523 3 12 3z"></path>
      </svg>
      無料で話してみる
    </a>

    <p class="footer-note">
      Webでそのまま始められます<br />
      すぐに利用できます
    </p>

    <div class="trust-badges">
      <span class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        完全匿名
      </span>

      <span class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        安心・安全
      </span>

      <span class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12l2 2 4-4"></path>
        </svg>
        無料
      </span>
    </div>
  </main>

</html>
